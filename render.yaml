# EthicalAlt — Render Blueprint
# Set secret env vars in the dashboard: ANTHROPIC_API_KEY, ETSY_API_KEY,
# VITE_API_URL (static site — your server public URL, no trailing slash).

services:
  - type: web
    name: ethicalalt-server
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_VISION_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_INVESTIGATION_MODEL
        value: claude-sonnet-4-6
      - key: ETSY_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

  - type: static_site
    name: ethicalalt-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
